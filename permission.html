<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enable camera &amp; mic — Kibitz</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; }
      body {
        background: #0b241c;
        color: #e7f3ec;
        font: 14px/1.55 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .box { max-width: 360px; text-align: center; }
      h1 { font-size: 1.15rem; color: #8fd3b0; margin: 0 0 10px; }
      p { color: #cfe6da; margin: 0 0 16px; }
      .ok { color: #8fd3b0; }
      .err { color: #ffb4ad; }
      button {
        background: #18794e; color: #fff; border: 0; border-radius: 9px;
        padding: 10px 16px; font: inherit; font-weight: 700; cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: default; }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Enable camera &amp; microphone</h1>
      <p id="msg">
        Kibitz needs your permission to use the camera and microphone. Click <b>Allow</b> on the prompt — you only do
        this once, then it works in the side panel.
      </p>
      <button id="go">Allow camera &amp; mic</button>
    </div>
    <script src="permission.js"></script>
  </body>
</html>
